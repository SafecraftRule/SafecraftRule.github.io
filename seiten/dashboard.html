<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <script type="module" src="../scripts/loading_screen.js"></script>
    <link rel="stylesheet" href="../styles/dashboard.css" />
    <script type="module" src="../scripts/dashboard_handler.js"></script>
  </head>
  <body>
    <script>
      function getCookie(name) {
        const cDecoded = decodeURIComponent(document.cookie);
        const cArray = cDecoded.split("; ");
        let result = null;

        cArray.forEach((element) => {
          if (element.indexOf(name) == 0) {
            result = element.substring(name.length + 1);
          }
        });
        return result;
      }

      if (getCookie("user") === null) {
        console.log("Benutzer ist nicht eingeloggt...");
        window.location.href = "../index.html";
      }
    </script>
    <div class="loader" id="loader"></div>
    <div class="wrapper" id="wrapper">
      <dialog class="logoutdia" id="logoutdia">
        <i class="bx bx-x-circle" id="closedialog"></i>
        <h1>Wirklich ausloggen?</h1>
        <button class="inputfields" id="logoutbtn">Bestätigen</button>
      </dialog>
      <div class="settings">
        <h1 id="userh1">Benutzername wird geladen</h1>
        <button class="inputfields" id="logoutdiabtn">Ausloggen</button>
      </div>
    </div>
  </body>
</html>
