<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Startseite</title>
    <link rel="stylesheet" href="styles/index.css" />
    <script type="module" src="scripts/index.js"></script>
    <script type="module" src="scripts/loading_screen.js"></script>
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <dialog id="error"><h1>Fehler!</h1></dialog>
    <dialog id="registerinfo"><h1>Account wird erstellt...</h1></dialog>
    <dialog id="registerdia">
      <button id="closedialog"><i class="bx bx-x-circle"></i></button>
      <h1>Registrieren</h1>
      <form action="">
        <input
          type="text"
          id="usernameinput"
          placeholder="Benutzernamen auswählen"
          required
          class="inputfields"
        />
        <input
          class="inputfields"
          type="text"
          id="emailinput"
          placeholder="Deine Email"
          required
        />
        <input
          type="text"
          id="passwordinput"
          placeholder="Passwort auswählen"
          required
          class="inputfields"
        />
        <button type="submit" class="buttons" id="registerbtn1">
          Registrieren
        </button>
      </form>
    </dialog>
    <div id="overlay"></div>
    <div class="loader" id="loader"></div>
    <div class="wrapper" id="wrapper">
      <button id="loginbtn" class="buttons">Login</button>
      <button id="registerbtn" class="buttons">Registrieren</button>
    </div>
  </body>
</html>
